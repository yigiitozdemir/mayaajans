<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Referanslarımız — Maya Ajans</title>
<meta name="description" content="Maya Ajans olarak birlikte çalıştığımız markalar ve referanslarımız.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@400;500;600&family=Archivo+Black&family=Mr+Dafoe&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0b0a09;
  --bg2:#141210;
  --cream:#ddd5c7;
  --cream-dim:#a89f90;
  --copper:#a5604a;
  --copper-light:#c47f66;
  --line:rgba(221,213,199,.12);
  --radius:20px;
}
*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--cream);font-family:'Archivo',sans-serif;line-height:1.6;overflow-x:hidden}
::selection{background:var(--copper);color:#fff}
.logo{display:inline-block;position:relative;line-height:1;text-decoration:none}
.logo .block{font-family:'Archivo Black',sans-serif;font-size:1.7rem;letter-spacing:.04em;color:var(--cream)}
.logo .script{font-family:'Mr Dafoe',cursive;font-size:1.35rem;color:var(--copper);position:absolute;left:12%;top:52%;white-space:nowrap;transform:rotate(-4deg)}
.logo img{height:46px;display:block}
nav{position:fixed;top:0;left:0;right:0;z-index:100;padding:18px 5%;display:flex;align-items:center;justify-content:space-between;background:rgba(11,10,9,.9);backdrop-filter:blur(14px);box-shadow:0 1px 0 var(--line)}
.nav-links{display:flex;gap:34px;align-items:center;list-style:none}
.nav-links a{color:var(--cream-dim);text-decoration:none;font-size:.92rem;transition:color .2s}
.nav-links a:hover{color:var(--cream)}
.btn{display:inline-block;padding:13px 28px;border-radius:100px;font-weight:600;font-size:.92rem;text-decoration:none;transition:transform .2s,background .2s;cursor:pointer;border:none}
.btn-copper{background:var(--copper);color:#fff}
.btn-copper:hover{background:var(--copper-light);transform:translateY(-2px)}
.btn-ghost{border:1px solid var(--line);color:var(--cream);background:transparent}
.btn-ghost:hover{border-color:var(--copper);color:var(--copper-light);transform:translateY(-2px)}
main{padding:160px 5% 110px;max-width:1180px;margin:0 auto;min-height:70vh}
.sec-label{font-family:'Mr Dafoe',cursive;color:var(--copper);font-size:1.6rem;display:block;margin-bottom:10px}
h1{font-family:'Archivo Black',sans-serif;font-size:clamp(2rem,5vw,3.2rem);line-height:1.12;margin-bottom:18px}
.sec-desc{color:var(--cream-dim);max-width:560px;margin-bottom:56px}
.ref-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:24px}
.ref-item{background:#ffffff;border-radius:var(--radius);overflow:hidden;display:flex;flex-direction:column;transition:transform .3s,box-shadow .3s}
.ref-item:hover{transform:translateY(-6px);box-shadow:0 16px 40px rgba(0,0,0,.35)}
.ref-logo{height:210px;display:flex;align-items:center;justify-content:center;padding:26px}
.ref-logo img{max-height:150px;max-width:75%;object-fit:contain}
.ref-body{padding:0 24px 22px}
.ref-body h3{color:#1c1a17;font-size:1.12rem;margin-bottom:12px}
.ref-tags{display:flex;flex-wrap:wrap;gap:8px}
.ref-tags span{background:rgba(165,96,74,.14);color:#8a4a36;font-size:.8rem;font-weight:600;padding:5px 13px;border-radius:8px}
.geri{margin-top:56px;text-align:center}
footer{border-top:1px solid var(--line);padding:44px 5%;text-align:center;color:var(--cream-dim);font-size:.85rem}
.reveal{opacity:0;transform:translateY(30px);transition:opacity .7s ease,transform .7s ease}
.reveal.visible{opacity:1;transform:none}
@media(max-width:860px){.nav-links{display:none}}
</style>
</head>
<body>

<nav>
  <a href="index.html" class="logo" aria-label="Maya Ajans">
    <span class="block">MAYA</span>
    <span class="script">Maya Ajans</span>
  </a>
  <ul class="nav-links">
    <li><a href="index.html#hizmetler">Hizmetler</a></li>
    <li><a href="index.html#surec">Sürecimiz</a></li>
    <li><a href="index.html#hakkimizda">Hakkımızda</a></li>
    <li><a href="index.html#iletisim">İletişim</a></li>
  </ul>
  <a href="index.html#iletisim" class="btn btn-copper">Teklif Al</a>
</nav>

<main>
  <span class="sec-label">bize güvenenler</span>
  <h1>Tüm Referanslarımız</h1>
  <p class="sec-desc">Birlikte çalıştığımız, dijitalde büyüttüğümüz markalar.</p>
  <div class="ref-grid" id="refGrid"></div>
  <div class="geri"><a href="index.html" class="btn btn-ghost">← Ana Sayfaya Dön</a></div>
</main>

<footer>© 2026 Maya Ajans — mayaajans.net · Tüm hakları saklıdır.</footer>

<script>
async function load(){
  try{
    const r=await fetch('content.json',{cache:'no-store'});
    if(!r.ok)return;
    const c=await r.json();
    const list=c.referanslar||[];
    // Logo görseli
    if(c.logo){document.querySelectorAll('.logo').forEach(l=>{l.innerHTML='<img src="'+encodeURI(c.logo)+'" alt="Maya Ajans">'})}
    document.getElementById('refGrid').innerHTML=list.map(r=>
      '<div class="ref-item reveal">'+
      '<div class="ref-logo">'+(r.logo?'<img src="'+encodeURI(r.logo)+'" alt="'+(r.firma||'Referans')+'" loading="lazy">':'')+'</div>'+
      '<div class="ref-body">'+
      (r.firma?'<h3>'+r.firma+'</h3>':'')+
      (r.etiketler?'<div class="ref-tags">'+r.etiketler.split(',').map(t=>'<span>'+t.trim()+'</span>').join('')+'</div>':'')+
      '</div></div>').join('');
  }catch(e){}
  const io=new IntersectionObserver(es=>es.forEach(e=>{if(e.isIntersecting){e.target.classList.add('visible');io.unobserve(e.target)}}),{threshold:.12});
  document.querySelectorAll('.reveal').forEach(el=>io.observe(el));
}
load();
</script>
</body>
</html>
